version: 2

updates:

  #
  # Gradle dependencies
  #
  - package-ecosystem: "gradle"
    directory: "/iot-c"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "15:41"
      timezone: "UTC"

    open-pull-requests-limit: 10

    commit-message:
      prefix: "dep-gradle"

    labels:
      - dependencies
      - java

    groups:
      gradle-patch-minor:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"

      gradle-dev-dependencies:
        dependency-type: "development"

  #
  # GitHub Actions
  #
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
      timezone: "UTC"

    open-pull-requests-limit: 5

    commit-message:
      prefix: "dep-github-actions"

    labels:
      - dependencies
      - github-actions

  #
  # Dockerfiles
  #
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "UTC"

    open-pull-requests-limit: 5

    commit-message:
      prefix: "dep-docker"

    labels:
      - dependencies
      - docker

    groups:
      docker-base-images:
        patterns:
          - "*"