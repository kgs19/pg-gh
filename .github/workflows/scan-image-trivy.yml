name: Scan-Image-Trivy

on:
  workflow_dispatch:
  workflow_call:
  push:

permissions:
  contents: read

jobs:
  metadata:
    name: Resolve build metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      java_images: ${{ steps.resolve.outputs.java_images }}
      third_party_images: ${{ steps.resolve.outputs.third_party_images }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Keep metadata resolution isolated so build/release workflows can reuse
      # the same contract without coupling to scan implementation details.
      - name: Resolve project metadata
        id: resolve
        uses: ./.github/actions/resolve-project-metadata

  scan-java-images:
    name: Scan Java image (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: metadata
    if: ${{ needs.metadata.outputs.java_images != '[]' }}
    permissions:
      contents: read
      packages: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.metadata.outputs.java_images) }}
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy scan Java image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.registry }}/${{ matrix.repository }}:${{ matrix.tag }}
          format: sarif
          output: trivy-java-${{ matrix.name }}.sarif
          severity: CRITICAL,HIGH
          vuln-type: os,library
          ignore-unfixed: true
          exit-code: '1'

      - name: Upload scan results to GitHub Security tab (Java image)
        if: always() # Upload results even if the scan fails to ensure visibility of vulnerabilities
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-java-${{ matrix.name }}.sarif
          category: trivy-java-${{ matrix.name }}

  scan-third-party-images:
    name: Scan 3rd-party image (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: metadata
    if: ${{ needs.metadata.outputs.third_party_images != '[]' }}
    permissions:
      contents: read
      security-events: write
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.metadata.outputs.third_party_images) }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Trivy scan 3rd-party image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.registry }}/${{ matrix.repository }}:${{ matrix.tag }}
          format: sarif
          output: trivy-third-party-${{ matrix.name }}.sarif
          severity: CRITICAL,HIGH
          vuln-type: os,library
          ignore-unfixed: true
          exit-code: '1'

      - name: Upload scan results to GitHub Security tab (3rd-party image)
        if: always() # Upload results even if the scan fails to ensure visibility of vulnerabilities
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-third-party-${{ matrix.name }}.sarif
          category: trivy-third-party-${{ matrix.name }}

